schemaVersion: "0.3"
description: "Enable S3 server access logging on a bucket using a direct PutBucketLogging API call. Checks both inherent exclusions (the log destination bucket must not log to itself) and operator-defined exclusions before remediating."
assumeRole: "{{ AutomationAssumeRole }}"
parameters:
  BucketName:
    type: String
    description: "The name of the S3 bucket to enable access logging on (injected by Config at runtime)"
  TargetBucket:
    type: String
    description: "The S3 bucket that receives the access logs"
  TargetPrefix:
    type: String
    description: "Key prefix for log objects in the destination bucket (can be empty string)"
    default: ""
  ExcludedResourceIds:
    type: String
    description: "Comma-separated list of bucket names to exempt from remediation (operator-defined). Pass a single space if the list is empty."
    default: " "
  InherentExclusionBucket:
    type: String
    description: "The log destination bucket name — always excluded from remediation to prevent infinite log delivery loops"
  AutomationAssumeRole:
    type: String
    description: "IAM role ARN for SSM Automation to assume"

mainSteps:
  - name: CheckExclusion
    action: aws:executeScript
    description: "Check both inherent exclusions (log destination bucket must not log to itself) and operator-defined exclusions before proceeding with remediation."
    inputs:
      Runtime: python3.11
      Handler: handler
      Script: |
        def handler(events, context):
            bucket_name = events["BucketName"]
            inherent_exclusion = events.get("InherentExclusionBucket", "").strip()
            excluded_raw = events.get("ExcludedResourceIds", "").strip()

            # Inherent exclusion: the log destination bucket must never log to itself.
            # Enabling logging on the destination bucket causes an infinite delivery loop
            # that grows exponentially and can produce enormous unexpected costs.
            if inherent_exclusion and bucket_name == inherent_exclusion:
                return {
                    "action": "skip",
                    "reason": (
                        f"{bucket_name} is the log destination bucket and is inherently "
                        "excluded — enabling logging on it would create an infinite loop."
                    ),
                }

            # Operational exclusion: buckets the operator has explicitly opted out.
            if excluded_raw:
                excluded = [b.strip() for b in excluded_raw.split(",") if b.strip()]
                if bucket_name in excluded:
                    return {
                        "action": "skip",
                        "reason": f"{bucket_name} is in the operator exclusion list.",
                    }

            return {"action": "remediate"}
      InputPayload:
        BucketName: "{{ BucketName }}"
        InherentExclusionBucket: "{{ InherentExclusionBucket }}"
        ExcludedResourceIds: "{{ ExcludedResourceIds }}"
    outputs:
      - Name: action
        Selector: $.Payload.action
        Type: String
      - Name: reason
        Selector: $.Payload.reason
        Type: String

  - name: BranchOnExclusion
    action: aws:branch
    inputs:
      Choices:
        - NextStep: ExitSkipped
          Variable: "{{ CheckExclusion.action }}"
          StringEquals: "skip"
      Default: InvokeRemediation

  - name: InvokeRemediation
    action: aws:executeAwsApi
    description: "Enable server access logging via a direct S3 PutBucketLogging API call. Using aws:executeAwsApi instead of aws:executeAutomation (AWS-ConfigureS3BucketLogging) because the managed document uses ACL-based approaches that fail on buckets with Bucket Owner Enforced (the default since April 2023)."
    inputs:
      Service: s3
      Api: PutBucketLogging
      Bucket: "{{ BucketName }}"
      BucketLoggingStatus:
        LoggingEnabled:
          TargetBucket: "{{ TargetBucket }}"
          TargetPrefix: "{{ TargetPrefix }}"
    isEnd: true

  - name: ExitSkipped
    action: aws:sleep
    description: "No-op exit step for excluded buckets. SSM Automation requires at least one step to run — this satisfies that requirement while doing nothing."
    inputs:
      Duration: PT1S
    isEnd: true
