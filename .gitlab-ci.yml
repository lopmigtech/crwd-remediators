stages:
  - validate
  - test

variables:
  TF_VERSION: "1.6.0"

.terraform-base:
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  before_script:
    - terraform --version

fmt:
  extends: .terraform-base
  stage: validate
  script:
    - terraform fmt -check -recursive modules/

validate:
  extends: .terraform-base
  stage: validate
  script:
    - |
      for dir in modules/*/; do
        if [ -d "$dir" ]; then
          echo "=== Validating $dir ==="
          (cd "$dir" && terraform init -backend=false && terraform validate)
        fi
      done

plan-examples:
  extends: .terraform-base
  stage: validate
  script:
    - |
      for dir in modules/*/examples/basic/; do
        if [ -d "$dir" ]; then
          echo "=== Planning $dir ==="
          (cd "$dir" && terraform init -backend=false && terraform plan -input=false)
        fi
      done

test:
  extends: .terraform-base
  stage: test
  script:
    - |
      for dir in modules/*/; do
        if [ -d "$dir" ] && [ -f "${dir}tests/plan.tftest.hcl" ]; then
          echo "=== Testing $dir ==="
          (cd "$dir" && terraform test)
        fi
      done
