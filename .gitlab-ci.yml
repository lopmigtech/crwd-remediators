stages:
  - validate

variables:
  TF_VERSION: "1.6.0"

.terraform-base:
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  before_script:
    - terraform --version

fmt:
  extends: .terraform-base
  stage: validate
  script:
    - terraform fmt -check -recursive modules/

validate:
  extends: .terraform-base
  stage: validate
  script:
    - |
      for dir in modules/*/; do
        if [ -d "$dir" ]; then
          echo "=== Validating $dir ==="
          (cd "$dir" && terraform init -backend=false && terraform validate)
        fi
      done
